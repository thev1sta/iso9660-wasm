<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO WASM</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        .container {
            width: 768px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        textarea {
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>In-browser ISO image generation</h1>
        <p>Generation of .iso file inside browser using <a href="https://github.com/kdomanski/iso9660">iso9660 go library</a> compiled to WASM.</p>
        <textarea id="input" placeholder="Enter some text which will be placed in test.txt inside of ISO image" rows="10"></textarea>
        <button id="generate">Generate ISO</button>
    </div>
</body>
<script type="module">
    import { ISOWriter } from "../dist/index.js";

    const input = document.getElementById("input");
    const button = document.getElementById("generate");

    button.addEventListener("click", async () => {
        const iso = await ISOWriter.create();
        iso.addFile("test.txt", new TextEncoder().encode(input.value));
        const image = await iso.write("DEMO_VOLUME");
        iso.close();

        const blob = new Blob([image], { type: "application/octet-stream" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "image.iso";
        a.click();
        URL.revokeObjectURL(url);
    });
</script>
</html>
